oauth:
    error:
        generic: We couldn't connect that account. Please try again.
        microsoft:
            admin_consent_required: >-
                Your organisation requires an administrator to approve plMail
                before you can connect this account. Please ask your Microsoft
                 administrator to grant access.
            tenant_mismatch: >-
                This account type can't sign in to plMail with the current
                configuration. Check the MICROSOFT_OAUTH_TENANT setting.
            app_not_found: >-
                plMail isn't registered in your Microsoft organisation.
            blocked_by_policy: >-
                A security policy in your organisation blocked this sign-in.
            consent_declined: >-
                Connection cancelled — plMail wasn't granted access.
            bad_credentials: >-
                plMail's Microsoft credentials are invalid or expired. This is a
                server configuration problem, not something you can fix.
