# IMAP/SMTP presets shown in the "Provider" dropdown on the account form.
#
# encryption: ssl | starttls | none  (must match the form choice values)
# domains:    used to auto-detect a preset from the email address the user types
# note:       optional hint rendered under the dropdown (translation-free, short)
presets:

    # ── Deutschland / DACH ────────────────────────────────────────────────
    gmx:
        name: GMX
        group: Deutschland
        domains: ['gmx.de', 'gmx.net', 'gmx.at', 'gmx.ch']
        note: 'IMAP muss im GMX-Webinterface unter Einstellungen erst aktiviert werden.'
        imap: { host: imap.gmx.net, port: 993, encryption: ssl }
        smtp: { host: mail.gmx.net, port: 587, encryption: starttls }

    gmx-com:
        name: GMX (International)
        group: Deutschland
        domains: ['gmx.com', 'gmx.us']
        imap: { host: imap.gmx.com, port: 993, encryption: ssl }
        smtp: { host: mail.gmx.com, port: 587, encryption: starttls }

    web-de:
        name: WEB.DE
        group: Deutschland
        domains: ['web.de']
        note: 'IMAP muss im WEB.DE-Webinterface erst freigeschaltet werden.'
        imap: { host: imap.web.de, port: 993, encryption: ssl }
        smtp: { host: smtp.web.de, port: 587, encryption: starttls }

    t-online:
        name: Telekom / T-Online
        group: Deutschland
        domains: ['t-online.de', 'magenta.de']
        note: 'Es wird ein separates E-Mail-Passwort benötigt, nicht das Telekom-Login.'
        imap: { host: secureimap.t-online.de, port: 993, encryption: ssl }
        smtp: { host: securesmtp.t-online.de, port: 587, encryption: starttls }

